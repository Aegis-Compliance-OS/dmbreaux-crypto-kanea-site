<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 560" width="560" height="560">
  <!--
    KANEA Technology Systems – Brand Mark
    Inspired by UAC Nkanea ("UAC lights") Adinkra symbol of technological advancement.
    
    The original UAC Nkanea is a four-quadrant interlocking stepped grid of
    positive/negative L-forms around a center void — representing the arrival
    of electric light and technological change in Akan society.
    
    This mark abstracts that structure into an original logomark:
    - Four "signal-trace" L-forms, each rotated 90° around a silent center
    - Rounded corners (r=8) distinguish it from the original flat stamp
    - Open center void is explicit, not structural — suggesting contained energy
    - Inner arms scaled to 2:3 ratio for optical balance at logo sizes
    - No bounding square — units float, giving the mark airiness
    
    Grid: unit = 45px. Mark = 360×360, centered at (280,280).
    Each quadrant occupies a 180×180 area. Outer arm = 45px thick.
    Inner step = 90px from quadrant inner corner.
    
    Color: Navy #0D1F3C on warm white #FAFAF7
  -->

  <defs>
    <style>
      .bg   { fill: #FAFAF7; }
      .mark { fill: #0D1F3C; }
    </style>
  </defs>

  <rect class="bg" width="560" height="560"/>

  <!--
    Coordinate system:
    - Center of mark = (280, 280)
    - TL quadrant occupies x:[100,280), y:[100,280)
    - TR quadrant occupies x:[280,460), y:[100,280)
    - BL quadrant occupies x:[100,280), y:[280,460)
    - BR quadrant occupies x:[280,460), y:[280,460)
    
    Each quadrant motif = outer corner L (two arms, 45px thick, 180px long)
    + inner reverse-L (two arms, 45px thick, 90px long)
    The inner L sits 90px from the outer corner (at the 2/4 unit mark).
    
    TL motif: outer corner at (100,100), arms go RIGHT and DOWN.
              inner reverse corner at (190,190), arms go LEFT and UP.
    TR motif: outer corner at (460,100), arms go LEFT and DOWN.
              inner reverse corner at (370,190), arms go RIGHT and UP.
    BL motif: outer corner at (100,460), arms go RIGHT and UP.
              inner reverse corner at (190,370), arms go LEFT and DOWN.
    BR motif: outer corner at (460,460), arms go LEFT and UP.
              inner reverse corner at (370,370), arms go RIGHT and DOWN.
  -->

  <!-- ══════════════════════════
       TOP-LEFT  (corner: 100,100)
       Outer: right arm + down arm
       Inner: left arm  + up arm  (from 190,190)
  ══════════════════════════════ -->
  <!-- outer right arm -->
  <rect class="mark" x="100" y="100" width="180" height="45" rx="8" ry="8"/>
  <!-- outer down arm -->
  <rect class="mark" x="100" y="100" width="45" height="180" rx="8" ry="8"/>
  <!-- inner left arm (goes left from 190 for 90px) -->
  <rect class="mark" x="100" y="190" width="90" height="45" rx="8" ry="8"/>
  <!-- inner up arm (goes up from 190 for 90px) -->
  <rect class="mark" x="190" y="100" width="45" height="90" rx="8" ry="8"/>


  <!-- ══════════════════════════
       TOP-RIGHT (corner: 460,100)
       Outer: left arm + down arm
       Inner: right arm + up arm (from 370,190)
  ══════════════════════════════ -->
  <!-- outer left arm -->
  <rect class="mark" x="280" y="100" width="180" height="45" rx="8" ry="8"/>
  <!-- outer down arm -->
  <rect class="mark" x="415" y="100" width="45" height="180" rx="8" ry="8"/>
  <!-- inner right arm (goes right from 370 for 90px) -->
  <rect class="mark" x="370" y="190" width="90" height="45" rx="8" ry="8"/>
  <!-- inner up arm (goes up from 370 for 90px) -->
  <rect class="mark" x="325" y="100" width="45" height="90" rx="8" ry="8"/>


  <!-- ══════════════════════════
       BOTTOM-LEFT (corner: 100,460)
       Outer: right arm + up arm
       Inner: left arm + down arm (from 190,370)
  ══════════════════════════════ -->
  <!-- outer right arm -->
  <rect class="mark" x="100" y="415" width="180" height="45" rx="8" ry="8"/>
  <!-- outer up arm -->
  <rect class="mark" x="100" y="280" width="45" height="180" rx="8" ry="8"/>
  <!-- inner left arm (goes left from 190 for 90px) -->
  <rect class="mark" x="100" y="325" width="90" height="45" rx="8" ry="8"/>
  <!-- inner down arm (goes down from 190,370 for 90px) -->
  <rect class="mark" x="190" y="370" width="45" height="90" rx="8" ry="8"/>


  <!-- ══════════════════════════
       BOTTOM-RIGHT (corner: 460,460)
       Outer: left arm + up arm
       Inner: right arm + down arm (from 370,370)
  ══════════════════════════════ -->
  <!-- outer left arm -->
  <rect class="mark" x="280" y="415" width="180" height="45" rx="8" ry="8"/>
  <!-- outer up arm -->
  <rect class="mark" x="415" y="280" width="45" height="180" rx="8" ry="8"/>
  <!-- inner right arm (goes right from 370 for 90px) -->
  <rect class="mark" x="370" y="325" width="90" height="45" rx="8" ry="8"/>
  <!-- inner down arm -->
  <rect class="mark" x="325" y="370" width="45" height="90" rx="8" ry="8"/>

</svg>
